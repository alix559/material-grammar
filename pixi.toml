[workspace]
authors = ["Alex <alixjcob559@gmail.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "material_grammar"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
setup-wgpu = "bash scripts/setup_wgpu.sh"
render = { depends-on = ["setup-wgpu"], cmd = "bash scripts/render.sh" }

[dependencies]
mojo = ">=1.0.0b1,<2"
glfw = ">=3.4,<4"
ffmpeg = ">=6,<8"

[pypi-dependencies]
pillow = ">=10,<12"
