name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Callback Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.0

      - name: Build C callback bridges
        run: |
          pixi run build-callbacks
          pixi run build-callback-probe

  test:
    name: Non-GPU Test Suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.0

      - name: Run non-GPU tests
        run: pixi run test

  test-gpu:
    name: GPU Tests (Self-hosted TODO)
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Placeholder
        run: echo "Enable this job once self-hosted GPU runners are available."
