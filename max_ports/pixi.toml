[workspace]
name = "smi-ted-max"
version = "0.1.0"
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
max = ">=26.3.0,<27"
max-pipelines = ">=26.3.0,<27"
python = ">=3.12,<3.15"
huggingface_hub = ">=0.26"
safetensors = ">=0.4"
pytorch-cpu = ">=2.4"
rdkit = ">=2024.3"
pydantic = ">=2.13.4,<3"
av = "*"
click = "*"
exceptiongroup = "*"
gguf = "*"
hf-transfer = "*"
llguidance = "*"
jinja2 = "*"
pillow = "*"
psutil = "*"
pydantic-settings = "*"
pyyaml = "*"
requests = "*"
sentencepiece = "*"
taskgroup = "*"
tiktoken = "*"
tqdm = "*"
uvicorn = "*"
uvloop = "*"
aiofiles = "*"
asgiref = "*"
fastapi = "*"
httpx = "*"
msgspec = "*"
openai = "*"
opentelemetry-api = "*"
opentelemetry-exporter-otlp-proto-http = "*"
opentelemetry-exporter-prometheus = "*"
opentelemetry-sdk = "*"
prometheus_client = "*"
pyinstrument = "*"
python-json-logger = "*"
pyzmq = "*"
regex = "*"
scipy = "*"
sse-starlette = "*"
starlette = "*"
nbdev = ">=3.1.0,<4"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.3.0,<8"

[pypi-dependencies]
transformers = ">=4.45,<6"
accelerate = ">=0.30"
scikit-learn = ">=1.4"
pandas = ">=2.0"

[tasks]
setup-model = "python ./scripts/setup_model_assets.py"
serve = { depends-on = ["setup-model"], cmd = "max serve --model-path ./model_assets/ibm-research_materials.smi-ted --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=cpu" }
serve-gpu = { depends-on = ["setup-model"], cmd = "max serve --model-path ./model_assets/ibm-research_materials.smi-ted --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=gpu" }
serve-esol = "max serve --model-path ./model_assets/smi-ted-esol --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=cpu"
serve-bbbp = "max serve --model-path ./model_assets/smi-ted-bbbp --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=cpu"
serve-lipo = "max serve --model-path ./model_assets/smi-ted-lipo --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=cpu"
serve-esol-gpu = "max serve --model-path ./model_assets/smi-ted-esol --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=gpu"
serve-bbbp-gpu = "max serve --model-path ./model_assets/smi-ted-bbbp --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=gpu"
serve-lipo-gpu = "max serve --model-path ./model_assets/smi-ted-lipo --custom-architectures ./materials_smi_ted --quantization-encoding float32 --devices=gpu"
export-finetune = "python ./scripts/export_finetune_to_max.py"
predict-finetuned = "python ./scripts/predict_finetuned.py"
compare-finetune = "python ./scripts/compare_finetune_property.py"
gates = "python /root/.agents/skills/import-model/scripts/run_oss_gates.py ibm-research/materials.smi-ted --port-dir ./materials_smi_ted --arch-name SmiTedModel"
compare-hf = "python ./scripts/compare_hf_embeddings.py"
test = "python ./scripts/test_smi_ted.py --mode local"
test-serve = "python ./scripts/test_smi_ted.py --mode serve"
test-all = "python ./scripts/test_smi_ted.py --mode all --compare-hf"
train-property = "python ./scripts/predict_property.py train --task esol"
evaluate-property = "python ./scripts/predict_property.py evaluate --task esol --backend pytorch"
predict-property = "python ./scripts/predict_property.py predict --task esol --backend max"
