[workspace]
name = "smi-ted-max"
version = "0.1.0"
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
max = ">=26.3.0,<27"
max-pipelines = ">=26.3.0,<27"
python = ">=3.12,<3.15"
# Our code / notebooks
huggingface_hub = ">=0.26"
safetensors = ">=0.4"
pytorch-cpu = ">=2.4"
rdkit = ">=2024.3"
pandas = ">=2.0"
numpy = "*"
httpx = "*"
nbdev = ">=3.1.0,<4"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.3.0,<8"

[pypi-dependencies]
python-fasthtml = ">=0.14.5,<0.15"

[tasks]
setup-model = "python ./scripts/setup_model_assets.py"
export-nbs = "nbdev_export"
compare-hf = "python ./scripts/compare_hf_embeddings.py"
compare-decode = "python ./scripts/compare_hf_decode.py"
api = "python -m serve_api"
